# Pinned versions used to build the KG snapshot in this repo.
# Format: <source> = <version-or-release-id>  # comments
#
# "live" means the upstream API has no public version dial — the KG records
# the response date, not a version. For perfect reproducibility, freeze a
# date on your end and use it consistently.
#
# Generated against gbd_knowledge_graph.db build 2026-04-28.

# Layer 0 — gene / protein backbone
mygene_info        = "v3 API, queried 2026-04-15"     # https://mygene.info/v3
uniprot            = "release 2025_01, queried 2026-04-15"  # rest.uniprot.org

# Layer 1 — ontologies
gene_ontology      = "via MyGene.info, 2026-04-15"
cell_ontology      = "OLS4 live, 2026-04-15"
efo                = "OLS4 live, 2026-04-15"          # Disease hierarchy
oncotree           = "live, 2026-04-15"               # oncotree.info
kegg               = "live, 2026-04-15"               # rest.kegg.jp
reactome           = "release 86 (2025-09), via reactome2py"
mirbase            = "release 22.1, hsa.gff3"
ipd_imgt_hla       = "release 3.55, queried 2026-04-15"
hpa                = "v23"                             # PINNED — do not float

# Layer 2 — disease / drug / variant
opentargets        = "release 24.06"                  # api.platform.opentargets.org/api/v4
chembl             = "release 34"                     # ebi.ac.uk/chembl
dgidb              = "v5 GraphQL, 2026-04-15"
clinvar            = "ftp 2026-04-01 weekly"          # eutils.ncbi.nlm.nih.gov

# Layer 3 — interactions / regulation / perturbation (Enrichr libraries)
string                                 = "v12.0"
enrichr_chea                           = "ChEA_2022"                                   # PINNED
enrichr_encode_tf_chip                 = "ENCODE_TF_ChIP-seq_2015"                     # PINNED
enrichr_encode_chea_consensus          = "ENCODE_and_ChEA_Consensus_TFs_from_ChIP-X"  # latest
enrichr_lincs_l1000_crispr_ko_consensus = "LINCS_L1000_CRISPR_KO_Consensus_Sigs"       # latest
enrichr_panglaodb                      = "PanglaoDB_Augmented_2021"                    # PINNED
enrichr_azimuth                        = "Azimuth_Cell_Types_2023"                     # PINNED
collectri                              = "release 2024-09"

# Layer 4 — DepMap
depmap_release    = "24Q2"                            # CRISPRGeneEffect.csv from this release
depmap_score      = "Chronos consensus"               # the Achilles + Sanger Score combined call
tcpgdb            = "internal v1.0 (2026-03)"
taiji2            = "internal v0.4 (ENCODE+GEO PageRank communities)"

# Layer 5 — patient cohorts
cptac             = "v3.2 (PDC, 2024-12)"

# Build host (kept for traceability — irrelevant to reproducibility)
build_host        = "Yale YCRC (Bouchet)"
build_date        = "2026-04-28"
